services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "4000:4000"
    environment:
      DBOS_SYSTEM_DATABASE_URL: ${DBOS_SYSTEM_DATABASE_URL}
      DASHBOARD_PORT: "4000"
      RUNNING_IN_DOCKER: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
